# etcd配置示例

etcd:
  # etcd服务器地址列表
  endpoints:
    - "localhost:2379"
    # - "192.168.1.100:2379"
    # - "192.168.1.101:2379"
    # - "192.168.1.102:2379"
  
  # 连接超时时间
  dialTimeout: 5s
  
  # 认证信息（可选）
  # username: "admin"
  # password: "password"
  
  # TLS配置（可选）
  tls:
    enabled: false
    # certFile: "/path/to/client.crt"
    # keyFile: "/path/to/client.key"
    # caFile: "/path/to/ca.crt"
    # insecureSkipVerify: false
